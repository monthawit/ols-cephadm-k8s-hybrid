####### HAproxy ConfigMap ##########
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-rgw-01-config
  namespace: test-haproxy-01
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 5000

      # สำหรับ Prometheus exporter
      #stats socket ipv4@0.0.0.0:9999 level admin
  
    defaults
      log global
      mode http
      option httplog
      option dontlognull

      timeout connect 5s
      timeout client  60s
      timeout server  60s
      timeout http-request 10s

      retries 3

    # ============================
    # Prometheus Metrics Endpoint
    # ============================
    frontend prometheus
      bind *:9101
      mode http
      http-request use-service prometheus-exporter #if { path /metrics }

    # ============================
    #  Frontend (receive traffic)
    # ============================
    frontend lb_frontend
      bind *:80
      mode http

      # ---- ACL สำหรับ health / probe ----
      acl is_kube_probe hdr(User-Agent) -i kube-probe
      acl is_rgw_health path -i /swift/healthcheck
      acl is_metrics path -i /metrics

      use_backend lb_backend_health if is_kube_probe or is_rgw_health or is_metrics
      default_backend lb_backend

    # ============================
    #  Backend (Ceph RGW - S3 Traffic)
    # ============================
    backend lb_backend
      mode http
      balance roundrobin

      # RGW health check
      option httpchk GET /swift/healthcheck
      http-check expect status 200

      # Health tuning
      default-server inter 3s fall 3 rise 2

      # -------- Site A (Active) --------
      server ceph-a-rgw-01 172.16.50.241:8080 check
      server ceph-a-rgw-02 172.16.50.242:8080 check
      server ceph-a-rgw-03 172.16.50.243:8080 check

      # -------- Site B (Standby) --------
      server ceph-b-rgw-01 172.16.50.202:8080 check backup
      server ceph-b-rgw-02 172.16.50.203:8080 check backup
      server ceph-b-rgw-03 172.16.50.204:8080 check backup

    # ============================
    #  Backend (Health / Probe Only)
    # ============================
    backend lb_backend_health
      mode http
      balance roundrobin

      option httpchk GET /swift/healthcheck
      http-check expect status 200

      default-server inter 3s fall 3 rise 2

      # -------- Site A --------
      server ceph-a-rgw-01 172.16.50.241:8080 check
      server ceph-a-rgw-02 172.16.50.242:8080 check
      server ceph-a-rgw-03 172.16.50.243:8080 check

      # -------- Site B (Standby) --------
      server ceph-b-rgw-01 172.16.50.202:8080 check backup
      server ceph-b-rgw-02 172.16.50.203:8080 check backup
      server ceph-b-rgw-03 172.16.50.204:8080 check backup

    # ============================
    #  HAProxy Stats Dashboard
    # ============================
    listen stats
      bind :8404
      mode http
      stats enable
      stats uri /stats
      stats refresh 5s

      # แนะนำให้เปลี่ยนเป็น Secret หรือจำกัด IP
      stats auth admin:admin

############### HAproxy Service (SVC) ############################ 
---
apiVersion: v1
kind: Service
metadata:
  name: ceph-rgw-01
  namespace: test-haproxy-01
  labels:
    app: ceph-rgw-01
spec:
  selector:
    app: ceph-rgw-01
  #type: ClusterIP
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: stats
      port: 8404
      targetPort: 8404
    - name: metrics
      port: 9101
      targetPort: 9101

################### HAproxy Deployment ###################################
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceph-rgw-01
  namespace: test-haproxy-01
  labels:
    app: ceph-rgw-01
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ceph-rgw-01
  template:
    metadata:
      labels:
        app: ceph-rgw-01
      annotations:
        reloader.stakater.com/match: "true"
        #kubernetes.io/ingress-bandwidth: "5M"  # limit ingress 5 Mbps , หน่วย: M = Mbps, K = Kbps 
        #kubernetes.io/egress-bandwidth: "5M"   # limit egress 5 Mbps , หน่วย: M = Mbps, K = Kbps
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ceph-rgw-01
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: haproxy
          image: haproxy:2.8
          args:
            - "-f"
            - "/usr/local/etc/haproxy/haproxy.cfg"
          ports:
            - name: http
              containerPort: 80
            - name: stats
              containerPort: 8404
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
         #readinessProbe:
         #   httpGet:
         #     path: /healthz
         #     port: 8404
         #   initialDelaySeconds: 2
         #   periodSeconds: 5
         # livenessProbe:
         #   httpGet:
         #     path: /healthz
         #     port: 8404
         #   initialDelaySeconds: 5
         #   periodSeconds: 10
      volumes:
        - name: haproxy-config
          configMap:
            name: ceph-rgw-01-config

