################# ScrapeCOnfig ####################
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  labels:
    release: prometheus
  name: ceph-rgw-01
  namespace: monitoring
spec:
  staticConfigs:
    - targets:
        - ceph-rgw-01.test-haproxy-01.svc.cluster.local:9101   # ← ใส่ IP ของ node exporter (ตัวอย่าง)
#        #- 10.10.10.12:9100   # ← เพิ่มได้หลายตัว
      labels:
        haproxy-name: ceph-rgw-01   # ← label ที่คุณใช้ใน relabeling
        customer-name: mek-ols
        service-level: prd
        envoy-gateway-name: gateway-01
  metricsPath: /
#  relabelings:
#    - action: replace
#      regex: (.*)
#      sourceLabels:
#        - __address__
#      targetLabel: instance
#    - action: replace
#      regex: (.*)
#      sourceLabels:
#        - vmname
#      targetLabel: instance        
#
